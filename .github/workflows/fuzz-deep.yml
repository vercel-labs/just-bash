name: Deep Fuzz

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  deep-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run deep fuzz
        run: pnpm --filter just-bash test:fuzz:long